<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATHENA Downloader</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #050505;
  color: white;
  min-height: 100vh;
  overflow-x: hidden;
}

.bg {
  position: fixed;
  inset: 0;
  background:
  radial-gradient(circle at top, rgba(255,255,255,0.12), transparent 35%),
  radial-gradient(circle at bottom, rgba(255,255,255,0.05), transparent 35%);
}

.container {
  position: relative;
  z-index: 2;
  max-width: 480px;
  margin: auto;
  padding: 20px;
}

.header {
  text-align: center;
  margin-top: 40px;
  margin-bottom: 35px;
}

.badge {
  display: inline-block;
  padding: 10px 18px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 999px;
  font-size: 13px;
  margin-bottom: 20px;
  backdrop-filter: blur(10px);
}

.title {
  font-size: 52px;
  font-weight: 800;
  letter-spacing: -2px;
}

.subtitle {
  margin-top: 12px;
  color: #9ca3af;
  line-height: 1.7;
  font-size: 15px;
}

.box {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border-radius: 35px;
  padding: 20px;
}

.input {
  width: 100%;
  border: none;
  outline: none;
  background: #111111;
  color: white;
  padding: 18px;
  border-radius: 20px;
  font-size: 15px;
  border: 1px solid rgba(255,255,255,0.05);
}

.button {
  width: 100%;
  margin-top: 15px;
  border: none;
  padding: 18px;
  border-radius: 20px;
  background: white;
  color: black;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.2s;
}

.button:active {
  transform: scale(0.97);
}

.loading {
  text-align: center;
  color: #9ca3af;
  margin-top: 18px;
}

.result {
  margin-top: 20px;
}

.card {
  background: #0f0f0f;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 28px;
  padding: 18px;
}

.thumbnail {
  width: 100%;
  border-radius: 24px;
  margin-bottom: 15px;
}

.video-title {
  font-size: 20px;
  font-weight: 700;
  line-height: 1.5;
}

.author {
  color: #9ca3af;
  margin-top: 8px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-top: 18px;
}

.stat {
  background: #181818;
  padding: 14px;
  border-radius: 18px;
  text-align: center;
}

.download {
  display: block;
  width: 100%;
  margin-top: 15px;
  padding: 16px;
  border-radius: 18px;
  text-align: center;
  text-decoration: none;
  font-weight: 700;
}

.primary {
  background: white;
  color: black;
}

.secondary {
  background: #1b1b1b;
  color: white;
}

.footer {
  text-align: center;
  color: #666;
  font-size: 13px;
  margin-top: 40px;
  padding-bottom: 20px;
}
</style>
</head>
<body>

<div class="bg"></div>

<div class="container">

<div class="header">
  <div class="badge">Premium Downloader</div>

  <div class="title">ATHENA</div>

  <div class="subtitle">
    TikTok • Instagram • Spotify Downloader
  </div>
</div>

<div class="box">

<input
id="url"
class="input"
type="text"
placeholder="Paste link here..."
>

<button class="button" onclick="download()">
Download Now
</button>

<div class="loading" id="loading"></div>

<div class="result" id="result"></div>

</div>

<div class="footer">
© 2026 ATHENA Downloader
</div>

</div>

<script>
async function download() {

const url = document.getElementById('url').value
const loading = document.getElementById('loading')
const result = document.getElementById('result')

loading.innerHTML = 'Processing...'
result.innerHTML = ''

let endpoint = ''

if (url.includes('tiktok')) {
endpoint = '/api/tiktok?url=' + encodeURIComponent(url)
}

else if (url.includes('instagram')) {
endpoint = '/api/instagram?url=' + encodeURIComponent(url)
}

else if (url.includes('spotify')) {
endpoint = '/api/spotify?url=' + encodeURIComponent(url)
}

else {
loading.innerHTML = ''
result.innerHTML = '<div class="card">URL tidak didukung</div>'
return
}

try {

const req = await fetch(endpoint)
const res = await req.json()

loading.innerHTML = ''

if (!res.status) {
result.innerHTML = `<div class="card">${res.message}</div>`
return
}

if (url.includes('tiktok')) {

result.innerHTML = `
<div class="card">

<h2 class="video-title">${res.title}</h2>

<div class="author">
@${res.author.nickname}
</div>

<div class="stats">
<div class="stat">❤️ ${res.stats.likes}</div>
<div class="stat">👁️ ${res.stats.views}</div>
</div>

<a href="${res.data[0].url}" target="_blank" class="download primary">
Download No Watermark
</a>

${res.music_info?.url ? `
<a href="${res.music_info.url}" target="_blank" class="download secondary">
Download MP3
</a>
` : ''}

</div>
`
}

else if (url.includes('instagram')) {

let media = ''

res.result.downloadUrl.forEach(v => {
media += `
<a href="${v}" target="_blank" class="download primary">
Download Media
</a>
`
})

result.innerHTML = `
<div class="card">
<h2 class="video-title">Instagram Downloader</h2>
${media}
</div>
`
}

else if (url.includes('spotify')) {

result.innerHTML = `
<div class="card">
<img src="${res.thumbnail}" class="thumbnail">

<h2 class="video-title">
${res.title}
</h2>

<div class="author">
${res.artist}
</div>

<a href="${res.track}" target="_blank" class="download primary">
Open Spotify
</a>

</div>
`
}

} catch(e) {
loading.innerHTML = ''

result.innerHTML = `
<div class="card">
${e.message}
</div>
`
}
}
</script>

</body>
</html>
